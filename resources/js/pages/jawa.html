<script>
    function createPayload() {
        const res = pm.response.json();
        return {
            qrBase64: res.url || "",
            statusText: res.status ? "Connected" : "Disconnected",
            statusColor: res.status ? "#27ae60" : "#e74c3c",
        };
    }

    pm.visualizer.set(template, createPayload());
</script>
<html>
    <head>
        <style>
            body {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                margin: 0;
                background-color: #f5f5f5;
                font-family: Arial, sans-serif;
            }
            .container {
                background: #ffffff;
                border-radius: 12px;
                padding: 32px;
                box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
                text-align: center;
            }
            h2 {
                color: #333333;
                margin-bottom: 8px;
                font-size: 20px;
            }
            p {
                color: #666666;
                font-size: 13px;
                margin-bottom: 24px;
            }
            img {
                max-width: 300px;
                width: 100%;
                border: 1px solid #e0e0e0;
                border-radius: 8px;
            }
            .status {
                margin-top: 16px;
                font-size: 12px;
                color: #27ae60;
                font-weight: bold;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h2>WhatsApp QR Code</h2>
            <p>Scan this QR code with your WhatsApp app</p>
            {{#if qrBase64}}
            <img
                src="data:image/png;base64,{{qrBase64}}"
                alt="WhatsApp QR Code"
            />
            {{else}}
            <p style="color: red">No QR code data found in response.</p>
            {{/if}}
            <div class="status">Status: {{statusText}}</div>
        </div>
    </body>
</html>
